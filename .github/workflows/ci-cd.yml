name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      # Step 3: Install backend dependencies (root)
      #   - name: Install backend dependencies
      #     run: npm install --force
      #     working-directory: .

      # # Step 4: Install frontend dependencies
      # - name: Install frontend dependencies
      #   run: npm install --force
      #   working-directory: ./frontend

      # # Step 5: Build the frontend application
      # - name: Build frontend application
      #   run: npm run build
      #   working-directory: ./frontend

      # Step 6: Setup SSH for Deployment
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 154.53.42.27 >> ~/.ssh/known_hosts

      # Step 7: Deploy to the server
      - name: Deploy to server
        if: github.ref == 'refs/heads/main'
        run: |
          ssh admin@154.53.42.27 << 'EOF'
           echo "🔐 Starting deployment to remote server"

           if [ -f ~/greenvalley/backend/.env ]; then
             echo "📁 Backing up existing .env file"
             cp ~/greenvalley/backend/.env ~/.env.bak
           fi

           if [ -d ~/greenvalley ]; then
             echo "📂 Pulling latest changes from Git"
             cd ~/greenvalley
             git reset --hard
             git pull origin main
           else
             echo "📂 Cloning repository"
             git clone https://github.com/aniket-017/greenvalley.git ~/greenvalley 
             cd ~/greenvalley 
           fi

           if [ -f ~/.env.bak ]; then
             echo "♻️ Restoring .env from backup"
             mv ~/.env.bak ~/greenvalley/backend/.env
           fi

           echo "📦 Installing backend dependencies"
           cd ~/greenvalley/backend
           npm install

           cd ../frontend
           echo "📦 Installing frontend dependencies"
           npm install --force
           echo "🛠️ Building frontend"
           npm run build

           cd ../backend
           echo "🚀 Starting or restarting PM2 process"
           if pm2 list | grep -q "greenvalley"; then
             echo "🔁 Restarting greenvalley"
             pm2 restart greenvalley
           else
             echo "▶️ Starting greenvalley"
             pm2 start npm --name "greenvalley" -- run dev
           fi

           echo "📋 PM2 process list:"
           pm2 list
          EOF